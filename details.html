<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details | Mahady Hasan Riyad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-ultra-dark: #050505;
            --accent-lime: #9acd32;
            --accent-lime-glow: rgba(154, 205, 50, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(154, 205, 50, 0.2);
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        body.light-mode {
            --bg-ultra-dark: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --glass-bg: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        body {
            background-color: var(--bg-ultra-dark);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            padding: 80px 8%;
            overflow-x: hidden;
            position: relative;
        }

        /* Noise Overlay */
        #noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.03;
        }

        /* Ambient Glow Orbs */
        .glow-orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.1; z-index: -2; pointer-events: none; }
        .orb-1 { width: 600px; height: 600px; background: var(--accent-lime); top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #1a1a1a; bottom: -10%; right: -10%; }

        #cursor-glow {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(154, 205, 50, 0.15) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%); transition: opacity 0.3s;
        }
        #cursor-dot {
            position: fixed; width: 8px; height: 8px; background: var(--accent-lime);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: transform 0.1s;
            box-shadow: 0 0 15px var(--accent-lime);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-lime);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 40px;
            transition: transform 0.3s;
        }
        .back-btn:hover { transform: translateX(-5px); }

        .details-container {
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .details-header { margin-bottom: 40px; }
        .details-header h1 {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }
        .details-tag {
            display: inline-block;
            background: rgba(154, 205, 50, 0.1);
            color: var(--accent-lime);
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .details-img {
            width: 100%;
            height: auto;
            max-height: 600px;
            object-fit: contain;
            background: #000;
            border-radius: 20px;
            margin-bottom: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .details-content {
            font-size: 1.15rem;
            color: #d1d1d1;
            margin-bottom: 50px;
            white-space: pre-wrap;
            line-height: 1.8;
            max-width: 800px;
        }

        .meta-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
        }

        .meta-item h4 {
            color: var(--accent-lime);
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-bottom: 12px;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .meta-item p {
            font-size: 1rem;
            color: #fff;
            font-weight: 500;
        }

        .project-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 40px;
            background: var(--accent-lime);
            color: #000;
            text-decoration: none;
            font-weight: 800;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(154, 205, 50, 0.2);
        }

        .project-link-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--accent-lime-glow);
            filter: brightness(1.1);
        }

        .project-link-btn i {
            font-size: 1.1rem;
        }

        /* Section Grids */
        .grid-container {
            display: grid;
            gap: 30px;
            margin-top: 40px;
        }
        .services-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .projects-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 768px) { .projects-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .projects-grid { grid-template-columns: repeat(3, 1fr); } }
        .cert-grid { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
        .blog-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        .edu-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .skills-container { display: flex; flex-direction: column; gap: 20px; }

        /* Shared Component Styles (Copied from index.html) */
        .tilt { transform-style: preserve-3d; transition: transform 0.1s ease-out; position: relative; }
        .glare {
            position: absolute; top: 0; left: 0; width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none; z-index: 5; transform: translate(-100%, -100%);
        }

        .service-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 50px 40px;
            border-radius: 24px; text-align: center; backdrop-filter: blur(20px);
        }
        .service-icon { font-size: 3rem; color: var(--accent-lime); margin-bottom: 20px; }
        .service-card h3 { font-size: 1.5rem; margin-bottom: 15px; }

        .project-card {
            background: #0a0a0a; border: 1px solid var(--glass-border); border-radius: 20px;
            overflow: hidden; backdrop-filter: blur(20px);
            position: relative;
        }

        .project-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s;
            backdrop-filter: blur(5px);
            z-index: 2;
        }

        .project-card:hover .project-overlay { opacity: 1; }

        .project-desc-hover {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .live-link-corner {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            background: rgba(255, 0, 0, 0.9);
            color: #fff;
            border-radius: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.3s;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.4);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .live-link-corner:hover {
            background: #ff0000;
            transform: scale(1.1);
        }

        .project-img-container { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
        .project-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .project-card:hover .project-img { transform: scale(1.1); }
        .project-content { padding: 25px; }
        .project-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .project-tag { 
            font-size: 0.65rem; 
            color: var(--accent-lime); 
            background: rgba(154, 205, 50, 0.05); 
            padding: 5px 12px; 
            border-radius: 100px; 
            border: 1px solid rgba(154, 205, 50, 0.2);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .project-card:hover .project-tag {
            border-color: rgba(154, 205, 50, 0.5);
            background: rgba(154, 205, 50, 0.1);
        }

        .cert-card { background: #0a0a0a; border: 1px solid var(--glass-border); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .cert-img-wrapper { position: relative; width: 100%; height: 250px; background: #0a0a0a; }
        .cert-img { width: 100%; height: 100%; object-fit: contain; padding: 10px; box-sizing: border-box; }
        .cert-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .cert-img-wrapper:hover .cert-overlay { opacity: 1; }
        .cert-title-bottom { padding: 20px; text-align: center; border-top: 1px solid var(--glass-border); background: #111; }
        .cert-title-bottom h3 { font-size: 1.2rem; margin: 0; }

        .edu-card { background: #0a0a0a; border: 1px solid var(--glass-border); padding: 40px; border-radius: 12px; text-align: center; }
        .gpa-pill { display: inline-block; padding: 6px 15px; border: 1px solid var(--accent-lime); border-radius: 100px; color: var(--accent-lime); font-weight: 700; font-size: 0.85rem; margin-bottom: 20px; }
        .edu-meta { font-size: 0.85rem; color: var(--text-secondary); display: block; }

        .blog-card { background: #0a0a0a; border: 1px solid var(--glass-border); border-radius: 15px; overflow: hidden; }
        .blog-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .blog-content { padding: 25px; }
        .blog-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 15px; }
        .read-more-btn { padding: 10px 20px; border: 1px solid var(--accent-lime); color: #fff; background: transparent; font-weight: 600; border-radius: 4px; cursor: pointer; }

        /* Skills */
        .skill-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .skill-header { padding: 30px; display: flex; align-items: center; gap: 30px; cursor: pointer; }
        .skill-icon-box { width: 70px; height: 70px; background: #111; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; border: 1px solid var(--glass-border); }
        .skill-info { flex: 1; }
        .main-progress-container { width: 100%; max-width: 300px; height: 40px; background: #000; border-radius: 100px; overflow: hidden; border: 1px solid var(--glass-border); }
        .main-progress-fill { height: 100%; background: linear-gradient(to right, #004d00, var(--accent-lime)); display: flex; align-items: center; justify-content: flex-end; padding-right: 20px; font-weight: 700; color: #000; font-size: 0.9rem; }
        .expand-icon { transition: transform 0.5s; font-size: 1.2rem; }
        .skill-card.active .expand-icon { transform: rotate(180deg); }
        .skill-body { max-height: 0; overflow: hidden; transition: max-height 0.8s ease; background: rgba(0, 0, 0, 0.3); }
        .skill-card.active .skill-body { max-height: 2000px; }
        .sub-skills-grid { padding: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        .sub-skill-item { display: flex; flex-direction: column; gap: 10px; }
        .sub-skill-header { display: flex; justify-content: space-between; }
        .sub-progress-bar { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; overflow: hidden; }
        .sub-progress-fill { height: 100%; background: var(--accent-lime); transition: width 1s; }

        /* Timeline */
        .timeline { position: relative; max-width: 1000px; margin: 40px auto; padding: 40px 0; }
        .timeline::after {
            content: ''; position: absolute; width: 2px;
            background: linear-gradient(to bottom, transparent, var(--accent-lime), transparent);
            top: 0; bottom: 0; left: 50%; margin-left: -1px;
            box-shadow: 0 0 10px var(--accent-lime-30);
        }
        .timeline-item { padding: 10px 40px; position: relative; width: 50%; }
        .timeline-item.left { left: 0; }
        .timeline-item.right { left: 50%; }
        .timeline-dot {
            position: absolute; width: 20px; height: 20px;
            right: -10px; top: 20px; background: var(--bg-ultra-dark);
            border: 3px solid var(--accent-lime); border-radius: 50%; z-index: 1;
            box-shadow: 0 0 15px var(--accent-lime-50);
        }
        .right .timeline-dot { left: -10px; }
        .timeline-content {
            padding: 30px; background: #0a0a0a; border: 1px solid var(--glass-border);
            border-radius: 12px; transition: var(--transition-smooth);
        }
        .timeline-content:hover { border-color: var(--accent-lime); transform: translateY(-5px); }
        .experience-list { list-style: none; padding-left: 0; color: var(--text-secondary); }
        .experience-list li { position: relative; padding-left: 20px; margin-bottom: 8px; font-size: 0.9rem; }
        .experience-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent-lime); }

        @media (max-width: 768px) {
            .timeline::after { left: 20px; }
            .timeline-item { width: 100%; padding-left: 50px; padding-right: 0; left: 0 !important; }
            .timeline-dot { left: 10px; right: auto; }
        }

        /* About Layout */
        .about-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; margin-top: 40px; }
        .about-image img { width: 100%; border-radius: 20px; border: 4px solid var(--accent-lime); padding: 5px; }
        .about-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { background: #0d0d0d; border: 1px solid var(--glass-border); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card h4 { font-size: 2rem; color: var(--accent-lime); margin-bottom: 5px; }

        /* Contact Details */
        .contact-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .contact-info-card { background: #0d0d0d; border: 1px solid var(--glass-border); padding: 30px; border-radius: 12px; display: flex; align-items: center; gap: 20px; }
        .contact-info-card .icon { font-size: 2rem; color: var(--accent-lime); }

        @media (max-width: 768px) {
            body { padding: 40px 5%; }
            .details-header h1 { font-size: 2.2rem; }
            .details-img { height: auto; }
            .about-layout { grid-template-columns: 1fr; }
            .skill-header { flex-direction: column; text-align: center; gap: 15px; }
            .skill-icon-box { width: 60px; height: 60px; font-size: 1.8rem; }
            .meta-info { padding: 20px; grid-template-columns: 1fr; gap: 15px; }
            .project-link-btn { width: 100%; justify-content: center; }
            .sub-skills-grid { grid-template-columns: 1fr; padding: 20px; }
            .main-progress-container { max-width: 100%; }
            .services-grid, .cert-grid, .blog-grid, .edu-grid, .contact-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="noise-overlay"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div id="cursor-glow"></div>
    <div id="cursor-dot"></div>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>

    <div class="details-container" id="details-content">
        <!-- Content will be injected here -->
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/data.js"></script>
    <script>
        // Theme persistence
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const id = urlParams.get('id');
        let portfolioData;

        async function initDetails() {
            portfolioData = await getPortfolioData();
            renderDetails();
            initTilt();
        }

        function renderDetails() {
            const container = document.getElementById('details-content');
            let content = '';

            // Handle Single Item View (Existing feature)
            if (id) {
                let item = null;
                if (type === 'project') {
                    item = portfolioData.projects.find(p => p && p.id == id);
                    if (item) {
                        content = `
                            <div class="details-header">
                                <span class="details-tag">${item.category}</span>
                                <h1>${item.title}</h1>
                            </div>
                            <img src="${item.image}" alt="${item.title}" class="details-img">
                            
                            <h3 style="color: var(--accent-lime); margin-bottom: 20px; font-family: var(--font-display);">Project Overview</h3>
                            <div class="details-content">${item.description}</div>
                            
                             <div class="meta-info">
                                <div class="meta-item">
                                    <h4>Category</h4>
                                    <p>${item.category.toUpperCase()}</p>
                                </div>
                                <div class="meta-item">
                                    <h4>Technologies</h4>
                                    <div class="project-tags">
                                        ${(item.tags || []).map(t => `<span class="project-tag">${t}</span>`).join('')}
                                    </div>
                                </div>
                                ${item.github && item.github !== '#' ? `
                                    <div class="meta-item">
                                        <h4>Source Code</h4>
                                        <a href="${item.github}" target="_blank" style="color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px;">
                                            <i class="fab fa-github"></i> GitHub Repository
                                        </a>
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div style="display: flex; flex-wrap: wrap; gap: 20px;">
                                ${item.link && item.link !== '#' ? `
                                    <a href="${item.link}" target="_blank" class="project-link-btn">
                                        <i class="fas fa-external-link-alt"></i>
                                        View Live Project
                                    </a>
                                ` : ''}
                                ${item.github && item.github !== '#' ? `
                                    <a href="${item.github}" target="_blank" class="project-link-btn" style="background: #333; color: #fff;">
                                        <i class="fab fa-github"></i>
                                        View GitHub
                                    </a>
                                ` : ''}
                            </div>
                        `;
                    }
                } else if (type === 'blog') {
                    item = portfolioData.blog.find(b => b.id == id);
                    if (item) {
                        content = `
                            <div class="details-header">
                                <span class="details-tag">${item.tag}</span>
                                <h1>${item.title}</h1>
                                <p style="color: var(--accent-lime)">${item.readTime} read</p>
                            </div>
                            <img src="${item.image}" alt="${item.title}" class="details-img">
                            <div class="details-content">${item.description}</div>
                        `;
                    }
                } else if (type === 'service') {
                    item = portfolioData.services.find(s => s.id == id);
                    if (item) {
                        content = `
                            <div class="details-header">
                                <span class="details-tag">Service</span>
                                <h1>${item.title}</h1>
                            </div>
                            <div style="font-size: 4rem; color: var(--accent-lime); margin-bottom: 30px;">${item.icon}</div>
                            <div class="details-content">${item.description}</div>
                        `;
                    }
                } else if (type === 'certification') {
                    item = portfolioData.certifications.find(c => c.id == id);
                    if (item) {
                        content = `
                            <div class="details-header">
                                <span class="details-tag">Certification</span>
                                <h1>${item.title}</h1>
                                <p style="color: var(--accent-lime)">${item.organization} | ${item.date}</p>
                            </div>
                            <img src="${item.image}" alt="${item.title}" class="details-img">
                            <div class="details-content">${item.description}</div>
                        `;
                    }
                } else if (type === 'education') {
                    item = portfolioData.education.find(e => e.id == id);
                    if (item) {
                        content = `
                            <div class="details-header">
                                <span class="details-tag">Education</span>
                                <h1>${item.title}</h1>
                                <p style="color: var(--accent-lime)">${item.degree} | GPA: ${item.gpa}</p>
                            </div>
                            <div class="meta-info">
                                <div class="meta-item"><h4>Period</h4><p>${item.period}</p></div>
                                <div class="meta-item"><h4>Location</h4><p>${item.location}</p></div>
                            </div>
                        `;
                    }
                } else if (type === 'experience') {
                    item = portfolioData.experience.find(exp => exp.id == id);
                    if (item) {
                        content = `
                            <div class="details-header">
                                <span class="details-tag">Experience</span>
                                <h1>${item.title}</h1>
                                <p style="color: var(--accent-lime)">${item.organization} | ${item.period}</p>
                            </div>
                            <div class="meta-info">
                                <div class="meta-item"><h4>Location</h4><p>${item.location}</p></div>
                            </div>
                            <div class="details-content" style="margin-top: 40px;">
                                <h3 style="color: var(--accent-lime); margin-bottom: 20px;">Key Responsibilities:</h3>
                                <ul style="list-style: disc; padding-left: 20px;">
                                    ${(item.tasks || []).map(t => `<li style="margin-bottom: 10px;">${t}</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    }
                }
                if (!item) content = `<h1>Item not found</h1>`;
            } 
            // Handle Full Section View (New feature)
            else {
                if (type === 'services') {
                    content = `
                        <div class="details-header"><h1>Our Services</h1></div>
                        <div class="grid-container services-grid">
                            ${portfolioData.services.map(s => `
                                <div class="service-card tilt" onclick="window.location.href='details.html?type=service&id=${s.id}'" style="cursor: pointer;">
                                    <div class="glare"></div>
                                    <div class="service-icon">${s.icon}</div>
                                    <h3>${s.title}</h3>
                                    <p>${s.description}</p>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (type === 'projects') {
                    content = `
                        <div class="details-header"><h1>Portfolio Projects</h1></div>
                        <div class="grid-container projects-grid">
                            ${portfolioData.projects.map(p => `
                                <article class="project-card tilt">
                                    <div class="glare"></div>
                                    <div class="project-img-container">
                                        <img src="${p.image}" class="project-img">
                                        ${p.link && p.link !== '#' ? `
                                            <a href="${p.link}" target="_blank" class="live-link-corner" title="Live Preview">
                                                <span class="live-dot"></span>
                                                <span style="font-size: 0.6rem; font-weight: 900; margin-left: 2px;">LIVE</span>
                                            </a>
                                        ` : ''}
                                        <div class="project-overlay">
                                            <p class="project-desc-hover">${p.description}</p>
                                            <a href="details.html?type=project&id=${p.id}" class="view-details-btn" style="padding: 10px 20px; background: var(--accent-lime); color: #000; text-decoration: none; font-weight: 700; border-radius: 4px; font-size: 0.8rem;">Full Details</a>
                                        </div>
                                    </div>
                                    <div class="project-content">
                                        <div class="project-tags">${(p.tags || []).map(t => `<span class="project-tag">${t}</span>`).join('')}</div>
                                        <h3>${p.title}</h3>
                                    </div>
                                </article>
                            `).join('')}
                        </div>
                    `;
                } else if (type === 'skills') {
                    content = `
                        <div class="details-header"><h1>Technical Skills</h1></div>
                        <div class="skills-container">
                            ${portfolioData.skills.map(skill => `
                                <div class="skill-card tilt">
                                    <div class="glare"></div>
                                    <div class="skill-header">
                                        <div class="skill-icon-box">${skill.icon}</div>
                                        <div class="skill-info">
                                            <h3>${skill.title}</h3>
                                            <p>${skill.subtitle}</p>
                                        </div>
                                        <div class="main-progress-container">
                                            <div class="main-progress-fill" style="width: ${skill.progress}%;">${(skill.progress/20).toFixed(1)}/5.0</div>
                                        </div>
                                        <div class="expand-icon">▼</div>
                                    </div>
                                    <div class="skill-body">
                                        <div class="sub-skills-grid">
                                            ${(skill.subSkills || []).map(sub => `
                                                <div class="sub-skill-item" style="opacity: 1; transform: none;">
                                                    <div class="sub-skill-header">
                                                        <h4>${sub.name}</h4>
                                                        <span>${sub.value}%</span>
                                                    </div>
                                                    <p class="sub-skill-desc">${sub.desc}</p>
                                                    <div class="sub-progress-bar"><div class="sub-progress-fill" style="width: ${sub.value}%;"></div></div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    // Add Click Handlers for skills
                    setTimeout(initSkillCards, 100);
                } else if (type === 'certifications') {
                    content = `
                        <div class="details-header"><h1>Certifications</h1></div>
                        <div class="grid-container cert-grid">
                            ${portfolioData.certifications.map(c => `
                                <div class="cert-card tilt" onclick="window.location.href='details.html?type=certification&id=${c.id}'" style="cursor: pointer;">
                                    <div class="glare"></div>
                                    <div class="cert-img-wrapper">
                                        <img src="${c.image}" class="cert-img">
                                        <div class="cert-overlay">
                                            <div class="cert-icon">💻</div>
                                            <p class="cert-org">${c.organization}</p>
                                            <p class="cert-date">${c.date}</p>
                                            <p class="cert-desc">${c.description}</p>
                                        </div>
                                    </div>
                                    <div class="cert-title-bottom"><h3>${c.title}</h3></div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (type === 'experience') {
                    content = `
                        <div class="details-header"><h1>Work Experience</h1></div>
                        <div class="timeline">
                            ${portfolioData.experience.map((exp, idx) => `
                                <div class="timeline-item ${idx % 2 === 0 ? 'left' : 'right'}">
                                    <div class="timeline-dot"></div>
                                    <div class="timeline-content tilt" onclick="window.location.href='details.html?type=experience&id=${exp.id}'" style="cursor: pointer;">
                                        <div class="glare"></div>
                                        <div class="timeline-date-tag" style="display: inline-block; padding: 4px 12px; background: var(--accent-lime-10); border: 1px solid var(--accent-lime-30); color: var(--accent-lime); border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;">${exp.period}</div>
                                        <h3 style="color: #ffffff; margin-bottom: 5px; font-weight: 700;">${exp.title}</h3>
                                        <h4 style="color: var(--accent-lime); margin-bottom: 10px; font-weight: 600; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px;">${exp.organization}</h4>
                                        <p style="color: #00d4ff; font-size: 0.9rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-weight: 500;">
                                            <i class="fas fa-map-marker-alt" style="color: #00d4ff;"></i> ${exp.location}
                                        </p>
                                        <ul class="experience-list">
                                            ${(exp.tasks || []).map(t => `<li>${t}</li>`).join('')}
                                        </ul>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (type === 'education') {
                    content = `
                        <div class="details-header"><h1>Education History</h1></div>
                        <div class="grid-container edu-grid">
                            ${portfolioData.education.map(e => `
                                <div class="edu-card tilt" onclick="window.location.href='details.html?type=education&id=${e.id}'" style="cursor: pointer;">
                                    <div class="glare"></div>
                                    <h3>${e.title}</h3>
                                    <p>${e.degree}</p>
                                    <div class="gpa-pill">GPA: ${e.gpa}</div>
                                    <span class="edu-meta">${e.period} | ${e.location}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (type === 'blog') {
                    content = `
                        <div class="details-header"><h1>Blog Posts</h1></div>
                        <div class="grid-container blog-grid">
                            ${portfolioData.blog.map(b => `
                                <article class="blog-card tilt" onclick="window.location.href='details.html?type=blog&id=${b.id}'" style="cursor: pointer;">
                                    <div class="glare"></div>
                                    <img src="${b.image}" class="blog-img">
                                    <div class="blog-content">
                                        <div class="blog-meta"><span>🏷️ ${b.tag}</span><span>⏱️ ${b.readTime}</span></div>
                                        <h3>${b.title}</h3>
                                        <p>${b.description}</p>
                                        <button class="read-more-btn">READ MORE</button>
                                    </div>
                                </article>
                            `).join('')}
                        </div>
                    `;
                } else if (type === 'about') {
                    content = `
                        <div class="details-header"><h1>About Me</h1></div>
                        <div class="about-layout">
                            <div class="about-image"><img src="${portfolioData.hero.image}" alt="Profile"></div>
                            <div class="about-details">
                                <p style="font-size: 1.2rem; margin-bottom: 30px;">${portfolioData.about.bio}</p>
                                <div class="about-stats">
                                    ${(portfolioData.about.stats || []).map(s => `
                                        <div class="stat-card tilt">
                                            <div class="glare"></div>
                                            <h4>${s.value}</h4>
                                            <p>${s.label}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                } else if (type === 'contact') {
                    content = `
                        <div class="details-header"><h1>Contact Details</h1></div>
                        <div class="contact-layout">
                            <div class="contact-info-card tilt">
                                <div class="glare"></div>
                                <div class="icon"><i class="fas fa-envelope"></i></div>
                                <div><h4>Email</h4><p>${portfolioData.about.email}</p></div>
                            </div>
                            <div class="contact-info-card tilt">
                                <div class="glare"></div>
                                <div class="icon"><i class="fas fa-phone"></i></div>
                                <div><h4>Phone</h4><p>${portfolioData.about.phone}</p></div>
                            </div>
                            <div class="contact-info-card tilt">
                                <div class="glare"></div>
                                <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                                <div><h4>Location</h4><p>${portfolioData.about.location}</p></div>
                            </div>
                        </div>
                    `;
                }
            }

            if (!content) {
                container.innerHTML = `<h1>Section not found</h1><p>The requested details could not be loaded.</p>`;
            } else {
                container.innerHTML = content;
            }
        }

        function initSkillCards() {
            const skillCards = document.querySelectorAll('.skill-card');
            skillCards.forEach(card => {
                const header = card.querySelector('.skill-header');
                if (!header) return;
                header.addEventListener('click', () => {
                    const isActive = card.classList.contains('active');
                    if (skillCards && skillCards.length > 0) {
                        skillCards.forEach(c => {
                            if (c && c.classList && typeof c.classList.remove === 'function') {
                                c.classList.remove('active');
                            }
                        });
                    }
                    if (!isActive) card.classList.add('active');
                });
            });
        }

        function initTilt() {
            const tiltCards = document.querySelectorAll('.tilt');
            tiltCards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (centerY - y) / 15;
                    const rotateY = (x - centerX) / 15;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
                    const glare = card.querySelector('.glare');
                    if (glare) glare.style.transform = `translate(${x - rect.width}px, ${y - rect.height}px)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) translateZ(0)`;
                    const glare = card.querySelector('.glare');
                    if (glare) glare.style.transform = `translate(-100%, -100%)`;
                });
            });
        }

        initDetails();

        // Custom Cursor Logic
        const cursorGlow = document.getElementById('cursor-glow');
        const cursorDot = document.getElementById('cursor-dot');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';
        });

        function animateCursor() {
            let dx = mouseX - cursorX;
            let dy = mouseY - cursorY;
            cursorX += dx * 0.1;
            cursorY += dy * 0.1;
            cursorGlow.style.left = cursorX + 'px';
            cursorGlow.style.top = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();
    </script>
</body>
</html>
