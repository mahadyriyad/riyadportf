<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pro | Mahady Hasan Riyad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020202;
            --bg-card: #0c0c0c;
            --bg-input: #141414;
            --accent-lime: #9acd32;
            --accent-lime-glow: rgba(154, 205, 50, 0.2);
            --text-main: #ffffff;
            --text-secondary: #71717a;
            --border: #1f1f23;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        .login-box {
            background: var(--bg-card);
            padding: 50px;
            border-radius: 32px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent-lime);
            border: none;
            color: black;
            font-weight: 700;
            cursor: pointer;
            border-radius: 16px;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--accent-lime-glow); }

        #dashboard { display: none; min-height: 100vh; }
        
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            height: 100vh;
            position: fixed;
            padding: 40px 24px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .logo { 
            color: var(--text-main); 
            margin-bottom: 50px; 
            font-size: 1.4rem; 
            font-weight: 800; 
            padding: 10px 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px solid var(--border);
            letter-spacing: -0.5px;
        }
        .logo span { color: var(--accent-lime); }

        .nav-group { flex-grow: 1; overflow-y: auto; }
        .nav-item {
            padding: 14px 16px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 16px;
            margin-bottom: 6px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 600;
        }
        .nav-item:hover { color: var(--text-main); background: #111; }
        .nav-item.active { background: var(--accent-lime); color: black; }

        .main-content { margin-left: var(--sidebar-width); padding: 60px; width: calc(100% - var(--sidebar-width)); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; }
        
        .card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .summary-card {
            background: #111;
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .summary-card h3 { font-size: 2rem; color: var(--accent-lime); margin-bottom: 5px; }
        .summary-card p { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; font-weight: 700; }

        .form-group { margin-bottom: 25px; position: relative; }
        .form-group label { display: block; margin-bottom: 10px; color: var(--text-secondary); font-weight: 600; font-size: 0.85rem; }

        input, textarea, select {
            width: 100%;
            padding: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            border-radius: 16px;
            outline: none;
            transition: var(--transition);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .item-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }
        .item-img { width: 100%; height: 180px; object-fit: cover; background: #111; }
        .item-info { padding: 20px; }
        
        .item-actions { 
            position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; 
            opacity: 0; transition: var(--transition);
        }
        .item-card:hover .item-actions { opacity: 1; }
        
        .action-btn { 
            background: rgba(0,0,0,0.8); border: none; color: white; cursor: pointer; 
            width: 35px; height: 35px; border-radius: 10px; display: flex; justify-content: center; align-items: center;
        }
        .action-btn:hover { background: var(--accent-lime); color: black; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--bg-card); padding: 40px; border-radius: 32px; width: 95%; max-width: 700px;
            max-height: 90vh; overflow-y: auto; border: 1px solid var(--border);
        }

        .img-preview-box {
            width: 100%; height: 200px; border-radius: 20px; overflow: hidden; margin-bottom: 20px;
            border: 2px dashed var(--border); background: #080808; display: flex; justify-content: center; align-items: center;
        }
        .img-preview { width: 100%; height: 100%; object-fit: cover; }

        .upload-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .upload-btn {
            background: #222; color: white; padding: 10px 20px; border-radius: 12px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }
        .upload-btn:hover { background: #333; }

        .toast {
            position: fixed; bottom: 30px; right: 30px; background: white; color: black;
            padding: 15px 30px; border-radius: 15px; font-weight: 700; display: none; z-index: 2000;
        }

        #file-input { display: none; }
        
        /* Messages Styling */
        .message-card {
            background: #111;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            position: relative;
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .message-header h4 { color: var(--accent-lime); font-size: 1.1rem; }
        .message-header span { font-size: 0.8rem; color: var(--text-secondary); }
        .message-content { color: var(--text-main); line-height: 1.6; margin-bottom: 15px; white-space: pre-wrap; }
        .message-footer { display: flex; gap: 20px; color: var(--text-secondary); font-size: 0.85rem; }
        .message-footer i { margin-right: 5px; }
        .delete-msg-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255, 68, 68, 0.1); color: #ff4444; border: none;
            width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }
        .delete-msg-btn:hover { background: #ff4444; color: white; }
        
        /* Mobile Menu Toggle */
        .admin-menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--accent-lime);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .admin-menu-toggle { display: flex; }
            .sidebar {
                left: -100%;
                transition: left 0.3s ease;
                z-index: 999;
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            }
            .sidebar.active { left: 0; }
            .main-content {
                margin-left: 0 !important;
                width: 100% !important;
                padding: 80px 20px 20px 20px !important;
            }
            .grid, .summary-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.5rem; }
            .login-box { padding: 30px; width: 90%; }
            .close-sidebar-btn { display: block !important; }
        }
        @media (max-width: 480px) {
            .modal-content { padding: 20px; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .upload-controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <button class="admin-menu-toggle" onclick="toggleSidebar()" id="adminMenuToggle" style="display: none;">
        <i class="fas fa-bars"></i>
    </button>


    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 30px;">Admin Access</h2>
            <div class="form-group">
                <input type="text" id="admin-user" placeholder="Username" style="margin-bottom: 15px;">
                <input type="password" id="admin-pass" placeholder="Password">
            </div>
            <button class="btn-primary" onclick="login()">Login</button>
            <p id="login-error" style="color: #ff4444; margin-top: 15px; display: none;">Invalid Username or Password</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                <div class="logo" style="margin-bottom: 0;">Mahady <span>Riyad</span></div>
                <button onclick="toggleSidebar()" class="close-sidebar-btn" style="background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="nav-group">
                <div class="nav-item active" onclick="showSection('overview')"><i class="fas fa-chart-pie"></i> Overview</div>
                <div class="nav-item" onclick="showSection('hero')"><i class="fas fa-home"></i> Hero</div>
                <div class="nav-item" onclick="showSection('services')"><i class="fas fa-concierge-bell"></i> Services</div>
                <div class="nav-item" onclick="showSection('skills')"><i class="fas fa-brain"></i> Skills</div>
                <div class="nav-item" onclick="showSection('projects')"><i class="fas fa-project-diagram"></i> Projects</div>
                <div class="nav-item" onclick="showSection('certifications')"><i class="fas fa-award"></i> Certifications</div>
                <div class="nav-item" onclick="showSection('experience')"><i class="fas fa-briefcase"></i> Experience</div>
                <div class="nav-item" onclick="showSection('education')"><i class="fas fa-graduation-cap"></i> Education</div>
                <div class="nav-item" onclick="showSection('blog')"><i class="fas fa-pen-nib"></i> Blog</div>
                <div class="nav-item" onclick="showSection('about')"><i class="fas fa-user"></i> About</div>
                <div class="nav-item" onclick="showSection('resume')"><i class="fas fa-file-pdf"></i> Resume</div>
                <div class="nav-item" onclick="showSection('messages')"><i class="fas fa-envelope"></i> Inbox</div>
                <div class="nav-item" onclick="showSection('contact-settings')"><i class="fas fa-cog"></i> Email Settings</div>
            </div>
            <div class="nav-item" onclick="logout()" style="color: #ff4444; margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> Logout</div>
            <a href="index.html" target="_blank" class="nav-item" style="text-decoration: none; margin-top: 10px; border: 1px solid var(--border);"><i class="fas fa-external-link-alt"></i> View Site</a>
        </div>

        <div class="main-content">
            <div id="content-area"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <div id="toast" class="toast">Updated!</div>
    <input type="file" id="file-input" accept="image/*">


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/data.js"></script>
    <script>
        let currentData = null;
        let activeSection = 'overview';

        async function initAdmin() {
            currentData = await getPortfolioData();
            // Check if already logged in
            let isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
            
            if (window.supabaseClient) {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) isLoggedIn = true;
            }

            if (isLoggedIn) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                document.getElementById('adminMenuToggle').style.display = '';
                setTimeout(() => renderSection('overview'), 100);
            }
        }
        initAdmin();

        // Add Enter key listener for login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
                login();
            }
        });

        async function login() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            
            document.getElementById('login-error').style.display = 'block';
            document.getElementById('login-error').style.color = 'var(--accent-lime)';
            document.getElementById('login-error').innerText = 'Logging in...';

            try {
                if (window.supabaseClient) {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: user,
                        password: pass
                    });
                    
                    if (error) {
                        if (user === 'admin' && pass === 'admin123') {
                            console.warn("Falling back to local admin because Supabase auth failed: ", error.message);
                        } else {
                            throw error;
                        }
                    }
                } else if (user !== 'admin' || pass !== 'admin123') {
                    throw new Error("Invalid Username or Password");
                }
                
                if (!currentData) {
                    document.getElementById('login-error').innerText = 'Loading data...';
                    currentData = await getPortfolioData();
                }
                
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                document.getElementById('adminMenuToggle').style.display = '';
                renderSection('overview');
            } catch (e) {
                console.error('Login Error:', e);
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('login-error').style.color = '#ff4444';
                document.getElementById('login-error').innerText = e.message || 'Invalid Username or Password';
            }
        }

        async function logout() { 
            if (window.supabaseClient) {
                await supabaseClient.auth.signOut();
            }
            localStorage.removeItem('adminLoggedIn');
            location.reload(); 
        }
        
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('active');
            const icon = document.querySelector('#adminMenuToggle i');
            if (sidebar.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        }

        function showSection(section) {
            activeSection = section;
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item && item.classList && typeof item.classList.remove === 'function') {
                    item.classList.remove('active');
                }
                const onclick = item.getAttribute('onclick');
                if (onclick && onclick.includes(`'${section}'`)) {
                    item.classList.add('active');
                }
            });
            // Close sidebar on mobile after click
            if (window.innerWidth <= 992) {
                document.querySelector('.sidebar').classList.remove('active');
                const icon = document.querySelector('#adminMenuToggle i');
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
            renderSection(section);
        }

        async function renderSection(section) {
            const area = document.getElementById('content-area');
            
            if (!currentData && section !== 'messages') {
                area.innerHTML = '<h2>Loading data...</h2>';
                return;
            }

            if (section === 'messages') {
                area.innerHTML = `
                    <div class="header">
                        <h1>Inbox Messages</h1>
                        <button class="btn-primary" onclick="showSupabaseHelper()" style="width: auto; padding: 10px 20px; background: #222; color: white; border: 1px solid var(--border);">
                            <i class="fas fa-database"></i> Database Setup
                        </button>
                    </div>
                    <div id="messages-list">Loading messages...</div>
                `;
                const messages = await getContactMessages();
                const list = document.getElementById('messages-list');
                
                if (messages.length === 0) {
                    list.innerHTML = '<div class="card"><p style="color: var(--text-secondary);">No messages yet.</p></div>';
                    return;
                }

                list.innerHTML = messages.map(m => `
                    <div class="message-card">
                        <button class="delete-msg-btn" onclick="deleteMsg('${m.id}')" title="Delete Message">
                            <i class="fas fa-trash"></i>
                        </button>
                        <div class="message-header">
                            <h4>${m.subject || 'No Subject'}</h4>
                            <span>${new Date(m.created_at).toLocaleString()}</span>
                        </div>
                        <div class="message-content">${m.message}</div>
                        <div class="message-footer">
                            <span><i class="fas fa-user"></i> ${m.name}</span>
                            <span><i class="fas fa-envelope"></i> ${m.email}</span>
                        </div>
                    </div>
                `).join('');
                return;
            }

            if (section === 'overview') {
                const pCount = currentData.projects ? currentData.projects.length : 0;
                const bCount = currentData.blog ? currentData.blog.length : 0;
                const cCount = currentData.certifications ? currentData.certifications.length : 0;
                const sCount = currentData.skills ? currentData.skills.length : 0;

                area.innerHTML = `
                    <div class="header"><h1>Dashboard Overview</h1></div>
                    <div class="summary-grid">
                        <div class="summary-card" onclick="showSection('messages')" style="cursor: pointer;">
                            <i class="fas fa-envelope" style="font-size: 1.5rem; color: var(--accent-lime); margin-bottom: 15px;"></i>
                            <h3 id="msg-count-loader">...</h3>
                            <p>Messages</p>
                        </div>
                        <div class="summary-card">
                            <i class="fas fa-project-diagram" style="font-size: 1.5rem; color: var(--accent-lime); margin-bottom: 15px;"></i>
                            <h3>${pCount}</h3>
                            <p>Projects</p>
                        </div>
                        <div class="summary-card">
                            <i class="fas fa-pen-nib" style="font-size: 1.5rem; color: var(--accent-lime); margin-bottom: 15px;"></i>
                            <h3>${bCount}</h3>
                            <p>Blog Posts</p>
                        </div>
                        <div class="summary-card">
                            <i class="fas fa-award" style="font-size: 1.5rem; color: var(--accent-lime); margin-bottom: 15px;"></i>
                            <h3>${cCount}</h3>
                            <p>Certificates</p>
                        </div>
                        <div class="summary-card">
                            <i class="fas fa-brain" style="font-size: 1.5rem; color: var(--accent-lime); margin-bottom: 15px;"></i>
                            <h3>${sCount}</h3>
                            <p>Skills</p>
                        </div>
                    </div>
                    <div class="grid">
                        <div class="card">
                            <h2 style="margin-bottom: 20px;"><i class="fas fa-info-circle"></i> Quick Tips</h2>
                            <ul style="color: var(--text-secondary); list-style: none;">
                                <li style="margin-bottom: 10px;"><i class="fas fa-check-circle" style="color: var(--accent-lime);"></i> Use high-quality images for projects.</li>
                                <li style="margin-bottom: 10px;"><i class="fas fa-check-circle" style="color: var(--accent-lime);"></i> Keep your bio short and impactful.</li>
                                <li style="margin-bottom: 10px;"><i class="fas fa-check-circle" style="color: var(--accent-lime);"></i> Update your experience regularly.</li>
                            </ul>
                        </div>
                        <div class="card">
                            <h2 style="margin-bottom: 20px;"><i class="fas fa-server"></i> System Status</h2>
                            <div style="display: flex; gap: 20px; align-items: center;">
                                <div style="width: 12px; height: 12px; background: var(--accent-lime); border-radius: 50%; box-shadow: 0 0 10px var(--accent-lime);"></div>
                                <p>Live Sync Active</p>
                            </div>
                            <p style="margin-top: 15px; font-size: 0.85rem; color: var(--text-secondary);">Your data is saved to Supabase (and cached locally for speed).</p>
                            <button class="btn-primary" onclick="showSupabaseHelper()" style="margin-top: 20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
                                <i class="fas fa-database"></i> Supabase Table Setup
                            </button>
                        </div>
                    </div>
                `;
                
                // Fetch message count asynchronously
                getContactMessages().then(msgs => {
                    const counter = document.getElementById('msg-count-loader');
                    if (counter) counter.innerText = msgs.length;
                });
                
                return;
            }

            let html = `<div class="header"><h1>Manage ${section}</h1>`;
            if (Array.isArray(currentData[section])) {
                html += `<button class="btn-primary" onclick="openModal('add', '${section}')" style="width: auto; padding: 12px 25px;">+ Add New</button></div>`;
                html += `<div class="grid">`;
                currentData[section].forEach((item, index) => {
                    if (!item) return;
                    const imgSrc = item.image || 'https://via.placeholder.com/400x200?text=No+Image';
                    let subtitle = item.description || item.subtitle || '';
                    if (section === 'experience') subtitle = `${item.organization} | ${item.period}`;
                    if (section === 'education') subtitle = `${item.degree} | ${item.gpa}`;
                    if (section === 'skills') subtitle = item.category || 'Uncategorized';
                    
                    html += `
                        <div class="item-card">
                            ${section !== 'services' && section !== 'experience' && section !== 'education' && section !== 'skills' ? `<img src="${imgSrc}" class="item-img">` : `<div style="height: 100px; background: #111; display: flex; align-items: center; justify-content: center;"><i class="fas fa-${section === 'services' ? 'concierge-bell' : section === 'experience' ? 'briefcase' : section === 'education' ? 'graduation-cap' : 'brain'}" style="font-size: 2rem; color: var(--accent-lime);"></i></div>`}
                            <div class="item-actions">
                                <button class="action-btn" onclick="openModal('edit', '${section}', ${index})"><i class="fas fa-edit"></i></button>
                                <button class="action-btn" onclick="deleteItem('${section}', ${index})" style="color: #ff4444;"><i class="fas fa-trash"></i></button>
                            </div>
                            <div class="item-info">
                                <h3 style="font-size: 1.1rem;">${item.title || item.name || 'Untitled'}</h3>

        function triggerUpload(inputId, previewId) {
            const fileInput = document.getElementById('file-input');
            fileInput.accept = 'image/*';
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    showToast('Uploading image... Please wait');
                    
                    if (window.supabaseClient) {
                        try {
                            const fileExt = file.name.split('.').pop();
                            const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
                            const { data, error } = await supabaseClient.storage.from('portfolio_files').upload(fileName, file);
                            
                            if (error) throw error;
                            
                            const { data: publicData } = supabaseClient.storage.from('portfolio_files').getPublicUrl(fileName);
                            
                            if (publicData && publicData.publicUrl) {
                                document.getElementById(inputId).value = publicData.publicUrl;
                                document.getElementById(previewId).src = publicData.publicUrl;
                                showToast('Image uploaded successfully!');
                                return;
                            }
                        } catch (err) {
                            console.warn('Supabase storage upload failed, falling back to Base64:', err);
                        }
                    }

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;

                            // Max dimensions
                            const MAX_WIDTH = 1200;
                            const MAX_HEIGHT = 1200;

                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_HEIGHT) {
                                    width *= MAX_HEIGHT / height;
                                    height = MAX_HEIGHT;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            // Compress to JPEG with 0.7 quality
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            
                            document.getElementById(inputId).value = compressedBase64;
                            document.getElementById(previewId).src = compressedBase64;
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };
            fileInput.click();
        }

        async function saveHero() {
            let usingSupabase = false;
            try {
                if (!window.supabaseClient) throw new Error("Supabase is not connected");
                const heroId = currentData.hero?.id || undefined;
                const dbData = {
                    title: document.getElementById('hero-title').value,
                    subtitle: document.getElementById('hero-subtitle').value,
                    bio: document.getElementById('hero-bio').value,
                    image: document.getElementById('hero-url').value,
                    is_active: true
                };
                
                let error = null;
                if (heroId) {
                    const res = await supabaseClient.from('hero').update(dbData).eq('id', heroId);
                    error = res.error;
                } else {
                    const res = await supabaseClient.from('hero').insert([dbData]);
                    error = res.error;
                }
                
                if (error) throw error;
                usingSupabase = true;
            } catch (err) {
                console.warn("Save Hero Supabase failed, falling back to local storage:", err.message);
            }
            
            if (!usingSupabase) {

                currentData.hero.title = document.getElementById('hero-title').value;
                currentData.hero.subtitle = document.getElementById('hero-subtitle').value;
                currentData.hero.bio = document.getElementById('hero-bio').value;
                currentData.hero.image = document.getElementById('hero-url').value;

            }

                if (file) {

                            const { data, error } = await supabaseClient.storage.from('portfolio_files').upload(fileName, file);
                            
                            if (error) throw error;
                            
                            const { data: publicData } = supabaseClient.storage.from('portfolio_files').getPublicUrl(fileName);
                            
                            if (publicData && publicData.publicUrl) {

                            console.warn('Supabase storage upload failed, falling back to Base64:', err);

        // Utility to safely escape values
        function escapeHTML(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        async function deleteItem(section, index) {
            try {
                if (!currentData[section] || !currentData[section][index]) return;
                
                const item = currentData[section][index];
                let usingSupabase = false;
                
                if (item.id && typeof item.id === 'string' && item.id.includes('-') && window.supabaseClient) {
                    try {
                        const { error } = await supabaseClient.from(section).delete().eq('id', item.id);
                        if (error) throw error;
                        usingSupabase = true;
                    } catch (dbErr) {
                        console.warn("Supabase delete failed, falling back to local:", dbErr.message);
                    }
                }
                
                if (!usingSupabase) {
                    currentData[section].splice(index, 1);
                    await savePortfolioData(currentData);
                } else {
                    currentData = await getPortfolioData();
                }
                
                renderSection(section);
                showToast('Deleted');
            } catch (err) {
                console.error('Delete error', err);
            }
        }

        function closeModal() {

        async function saveModal(type, section, index) {
            try {
                if (!window.supabaseClient) throw new Error("Supabase is not connected");
                
                let item = index !== null && currentData[section][index] ? { ...currentData[section][index] } : {};
                
                let dbData = {};

                if (section === 'projects') {
                    const tagsStr = (document.getElementById('m-tags')?.value || '');
                    dbData = {
                        title: document.getElementById('m-title')?.value || '',
                        description: document.getElementById('m-desc')?.value || '',
                        image: document.getElementById('m-img')?.value || '',
                        category: document.getElementById('m-cat')?.value || '',
                        project_link: document.getElementById('m-link')?.value || '#',
                        tags: tagsStr.split(',').map(t => t.trim()).filter(Boolean),
                        is_active: true
                    };
                } else if (section === 'services') {
                    dbData = {
                        title: document.getElementById('m-title').value,
                        description: document.getElementById('m-desc').value,
                        icon_svg: document.getElementById('m-icon').value,
                        is_active: true
                    };
                } else if (section === 'skills') {
                    dbData = {
                        title: document.getElementById('m-title').value,
                        category: document.getElementById('m-category').value,
                        emoji_icon: document.getElementById('m-icon').value,
                        is_active: true
                    };
                } else if (section === 'certifications') {
                    dbData = {
                        title: document.getElementById('m-title').value,
                        organization: document.getElementById('m-org').value,
                        date: document.getElementById('m-date').value,
                        description: document.getElementById('m-desc').value,
                        image: document.getElementById('m-img').value,
                        is_active: true
                    };
                } else if (section === 'blog') {
                    dbData = {
                        title: document.getElementById('m-title').value,
                        summary: document.getElementById('m-desc').value,
                        cover_image: document.getElementById('m-img').value,
                        tag: document.getElementById('m-tag').value,
                        read_time: document.getElementById('m-read').value,
                        published: true
                    };
                } else if (section === 'experience') {
                    dbData = {
                        job_title: document.getElementById('m-title').value,
                        organization: document.getElementById('m-org').value,
                        location: document.getElementById('m-loc').value,
                        period: document.getElementById('m-period').value,
                        tasks: document.getElementById('m-tasks').value.split('\n').filter(t => t.trim()),
                        is_active: true
                    };
                } else if (section === 'education') {
                    dbData = {
                        institution: document.getElementById('m-title').value,
                        degree: document.getElementById('m-degree').value,
                        gpa: document.getElementById('m-gpa').value,
                        period: document.getElementById('m-period').value,
                        location: document.getElementById('m-loc').value,
                        is_active: true
                    };
                }

                let usingSupabase = false;
                try {
                    if (!window.supabaseClient) throw new Error("Supabase is not connected");
                    if (type === 'edit' && item.id && typeof item.id === 'string' && item.id.includes('-')) {
                        const { error } = await supabaseClient.from(section).update(dbData).eq('id', item.id);
                        if (error) throw error;
                    } else {
                        const { error } = await supabaseClient.from(section).insert([dbData]);
                        if (error) throw error;
                    }
                    usingSupabase = true;
                } catch (dbErr) {
                    console.warn("Supabase save failed, falling back to local storage:", dbErr.message);
                }

                if (!usingSupabase) {
                    let mapped = {};
                    if (section === 'projects') mapped = { title: dbData.title, description: dbData.description, image: dbData.image, category: dbData.category, link: dbData.project_link, tags: dbData.tags };
                    else if (section === 'services') mapped = { title: dbData.title, description: dbData.description, icon: dbData.icon_svg };
                    else if (section === 'skills') mapped = { title: dbData.title, category: dbData.category, icon: dbData.emoji_icon };
                    else if (section === 'certifications') mapped = { title: dbData.title, organization: dbData.organization, date: dbData.date, description: dbData.description, image: dbData.image };
                    else if (section === 'blog') mapped = { title: dbData.title, summary: dbData.summary, image: dbData.cover_image, tag: dbData.tag, readTime: dbData.read_time };
                    else if (section === 'experience') mapped = { title: dbData.job_title, organization: dbData.organization, location: dbData.location, period: dbData.period, tasks: dbData.tasks };
                    else if (section === 'education') mapped = { title: dbData.institution, degree: dbData.degree, gpa: dbData.gpa, period: dbData.period, location: dbData.location };
                    
                    if (!currentData[section]) currentData[section] = [];
                    if (type === 'add') {
                        currentData[section].push({ id: Date.now(), ...mapped });
                    } else {
                        currentData[section][index] = { ...currentData[section][index], ...mapped };
                    }
                    await savePortfolioData(currentData);
                } else {
                    currentData = await getPortfolioData();
                }

                closeModal();
                renderSection(section);
                showToast();
            } catch (err) {
                console.error("Save Error:", err);
                alert("Failed to save changes: " + err.message);
            }
        }

        function showToast(msg = 'Updated!') {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.innerText = msg;
                toast.style.display = 'block';
                setTimeout(() => { if (toast) toast.style.display = 'none'; }, 3000);
            }
        }
